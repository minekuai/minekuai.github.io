<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>麦块MC群组</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .fullscreen-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            display: block;
        }
    </style>
</head>
<body>
    <iframe id="frame" class="fullscreen-iframe" src="https://49.233.136.90" allowfullscreen sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads allow-top-navigation-by-user-activation"></iframe>
    <script>
        const frame = document.getElementById('frame');
        frame.addEventListener('load', () => {
            try {
                const title = frame.contentDocument?.title;
                if (title) document.title = title;
            } catch(e) {}
        });
    </script>
</body>
</html>
